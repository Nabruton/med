<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KoruyucuHekim | Akıllı Servis Yönetimi</title>
    
    <!-- PWA & Apple Destek Etiketleri -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KoruyucuHekim">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon.svg">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f7fb;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #475569;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #d97706;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass-shadow: 0 4px 25px 0 rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body { 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%),
                radial-gradient(circle at bottom left, #f3e8ff 0%, transparent 40%); 
            color: var(--text-main); 
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .glass { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--card-border); border-radius: 16px; box-shadow: var(--glass-shadow); }

        .app-container { display: flex; height: 100dvh; overflow: hidden; }

        /* Mobile Header */
        .mobile-header { 
            display: none; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 12px 20px; 
            border-bottom: 1px solid #e2e8f0; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 1001;
            width: 100%;
        }

        /* Sidebar Styles */
        .sidebar { 
            width: 280px; 
            background: rgba(255, 255, 255, 0.98); 
            border-right: 1px solid #e2e8f0; 
            display: flex; 
            flex-direction: column; 
            padding: 24px; 
            z-index: 10; 
            transition: 0.3s;
        }

        .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
        .logo { 
            width: 46px; 
            height: 46px; 
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); 
            color: white; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 1.2rem; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }
        .brand h2 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; color: var(--text-main); }

        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .nav-divider { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 8px 12px; }
        
        .nav-menu a { 
            text-decoration: none; 
            color: var(--secondary); 
            padding: 12px 14px; 
            border-radius: 12px; 
            font-weight: 600; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 0.95rem; 
        }
        .nav-menu a:hover { background: #f1f5f9; color: var(--primary); }
        .nav-menu a.active { background: #eff6ff; color: var(--primary); font-weight: 700; }
        .nav-icon { font-size: 1.2rem; }

        .user-profile { display: flex; align-items: center; gap: 12px; padding: 16px; margin-top: 24px; border-top: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; }
        .avatar { width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .role { color: var(--success); font-weight: 700; font-size: 0.75rem; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 32px 48px; position: relative; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; flex-wrap: wrap; gap: 16px;}
        .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px;}

        /* Metrics */
        .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 32px; }
        .metric-card { display: flex; align-items: center; gap: 20px; padding: 24px; }
        .metric-icon { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
        .metric-card h3 { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        .metric-card .value { font-size: 2.2rem; font-weight: 800; color: var(--text-main); }

        /* List UI */
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .search-input { padding: 14px 20px; border-radius: 12px; border: 1px solid #e2e8f0; width: 320px; outline: none; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: 0.2s;}
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .patient-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr)); gap: 24px; }
        .patient-card { padding: 24px; position: relative; display: flex; flex-direction: column; cursor: grab; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .p-bed { background: #1e293b; color: white; padding: 4px 12px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; }
        .patient-card h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
        .p-diagnosis { font-weight: 600; background: #eff6ff; color: var(--primary); padding: 5px 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 12px; display: inline-block;}
        .p-notes { font-size: 0.95rem; color: var(--secondary); padding-top: 16px; border-top: 1px dashed #e2e8f0; line-height: 1.5; margin-bottom: 20px;}

        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;}
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2); }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); }
        .btn-epikriz { background: #f8fafc; border: 1px solid #e2e8f0; width: 100%; border-radius: 10px; padding: 12px; font-weight: 700; cursor: pointer; color: var(--secondary); margin-top: auto;}

        /* Tags */
        .tags-wrapper { margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 6px; }
        .tag-chip { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
        .tag-Kan { background: #fee2e2; color: #991b1b; }
        .tag-Konsültasyon { background: #fef08a; color: #854d0e; }
        .tag-Görüntüleme { background: #e0e7ff; color: #3730a3; }
        .tag-Taburcu { background: #dcfce7; color: #166534; }
        .tag-Riskli { background: #ffedd5; color: #9a3412; }

        /* Tools Grid */
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr)); gap: 24px; }
        .tool-card { padding: 24px; }
        .tool-icon { font-size: 2rem; margin-bottom: 16px; }
        .calc-select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 8px; }
        .result-box { margin-top: 20px; padding: 16px; border-radius: 12px; background: #eff6ff; font-weight: 800; font-size: 1.1rem; color: var(--primary); text-align: center;}

        /* Nav Bottom */
        .nav-bottom { display: none; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s;}
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal { width: 90%; max-width: 600px; padding: 32px; max-height: 90dvh; overflow-y: auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; color: var(--secondary); }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 1rem; }

        /* MOBILE OPTIMIZATION */
        @media screen and (max-width: 768px) {
            body { overflow-y: auto; overflow-x: hidden; }
            .app-container { display: block; min-height: 100dvh; overflow-y: auto; }
            .sidebar { display: none; }
            .mobile-header { display: flex; width: 100%; position: sticky; top: 0; z-index: 1001; }
            .nav-bottom { 
                display: flex; 
                position: fixed; 
                bottom: 0; 
                left: 0; 
                width: 100%; 
                background: rgba(255, 255, 255, 0.98); 
                backdrop-filter: blur(10px);
                height: 70px; 
                border-top: 1px solid #e2e8f0; 
                z-index: 1000; 
                padding-bottom: 10px;
                border-radius: 24px 24px 0 0;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            }
            .nav-bottom a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: var(--secondary); gap: 2px; }
            .nav-bottom a.active { color: var(--primary); }
            .nav-bottom .nav-icon { font-size: 1.4rem; }
            .nav-bottom .nav-text { font-size: 0.7rem; font-weight: 700; }

            .main-content { padding: 24px 20px; padding-bottom: 100px; width: 100%; height: auto; overflow: visible; display: block; }
            .metrics { grid-template-columns: 1fr; }
            .search-input { width: 100%; }
            .header-action { flex-direction: column; align-items: stretch; gap: 12px; }
            .header { flex-direction: column; }
            .header button { width: 100%; }
            .patient-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- MOBILE HEADER -->
        <header class="mobile-header">
            <div class="brand" style="margin:0">
                <div class="logo">KH</div>
                <h2 style="font-size:1.1rem">KoruyucuHekim</h2>
            </div>
            <button class="btn-icon" style="background:none; border:none; font-size:1.4rem" onclick="exportData()">💾</button>
        </header>

        <!-- DESKTOP SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">KH</div>
                <h2>KoruyucuHekim</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" data-tab="dashboard" class="active">
                    <span class="nav-icon">🏥</span>
                    <span class="nav-text">Panom</span>
                </a>
                <a href="#" data-tab="tools">
                    <span class="nav-icon">🧮</span>
                    <span class="nav-text">Klinik Araçlar</span>
                </a>
                <div class="nav-divider">Hafıza & Yedek</div>
                <a href="#" onclick="exportData()"><span class="nav-icon">💾</span> <span class="nav-text">Verileri Yedekle</span></a>
                <a href="#" onclick="importData()"><span class="nav-icon">📂</span> <span class="nav-text">Yedek Yükle</span></a>
            </nav>
            <div class="user-profile">
                <div class="avatar">DR</div>
                <div class="info">
                    <p class="name" style="font-weight:700">Klinik Doktoru</p>
                    <p class="role">🟢 Hafıza Aktif</p>
                </div>
            </div>
        </aside>

        <!-- MOBILE BOTTOM NAV -->
        <nav class="nav-bottom">
            <a href="#" data-tab="dashboard" class="active">
                <span class="nav-icon">🏥</span>
                <span class="nav-text">Pano</span>
            </a>
            <a href="#" data-tab="tools">
                <span class="nav-icon">🧮</span>
                <span class="nav-text">Araçlar</span>
            </a>
            <a href="#" onclick="exportData()">
                <span class="nav-icon">💾</span>
                <span class="nav-text">Yedek</span>
            </a>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- TAB: DASHBOARD -->
            <div id="tab-dashboard" class="tab-content active">
                <header class="header">
                    <div>
                        <h1>Servis Durumu</h1>
                        <p class="text-muted" id="currentDate">Tarih</p>
                    </div>
                    <button class="btn btn-primary" id="btnNewPatient">+ Yeni Hasta</button>
                </header>

                <div class="metrics">
                    <div class="metric-card glass">
                        <div class="metric-icon" style="background:rgba(37,99,235,0.1); color:var(--primary)">🏥</div>
                        <div><h3>Yatan Hasta</h3><p class="value" id="valTotal">0</p></div>
                    </div>
                    <div class="metric-card glass">
                        <div class="metric-icon" style="background:rgba(217,119,6,0.1); color:var(--warning)">⚡</div>
                        <div><h3>Bekleyen Aksiyon</h3><p class="value" id="valAction">0</p></div>
                    </div>
                </div>

                <div class="header-action">
                    <h2 style="font-weight:800">Hasta Listesi</h2>
                    <input type="text" id="searchInput" class="search-input" placeholder="İsim, Oda veya Tanı ara...">
                </div>
                <div class="patient-grid" id="patientGrid"></div>
            </div>

            <!-- TAB: TOOLS -->
            <div id="tab-tools" class="tab-content">
                <header class="header">
                    <h1>Medikal Araçlar</h1>
                </header>
                <div class="tools-grid" id="mainToolsGrid">
                    <!-- Dinamik olarak JS ile 19 araç eklenecek -->
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="patientModal">
        <div class="modal glass">
            <h2 id="modalTitle" style="margin-bottom:20px">Yeni Hasta</h2>
            <form id="patientForm">
                <input type="hidden" id="pId">
                <div class="form-group"><label>Ad Soyad</label><input type="text" id="pName" required></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
                    <div class="form-group"><label>Oda / Yatak</label><input type="text" id="pBed" required></div>
                    <div class="form-group"><label>Yatış Tarihi</label><input type="date" id="pDate" required></div>
                </div>
                <div class="form-group"><label>Tanı</label><input type="text" id="pDiag" required></div>
                <div class="form-group">
                    <label>Beklenen İşlem / Durum (Etiketler)</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; padding: 10px; background: rgba(255,255,255,0.5); border-radius: 8px;" id="tagsSelector">
                        <label style="display:flex; align-items:center; gap:4px; font-weight:600; font-size:0.85rem;"><input type="checkbox" value="Riskli"> Riskli</label>
                        <label style="display:flex; align-items:center; gap:4px; font-weight:600; font-size:0.85rem;"><input type="checkbox" value="Taburcu"> Taburcu</label>
                        <label style="display:flex; align-items:center; gap:4px; font-weight:600; font-size:0.85rem;"><input type="checkbox" value="Konsültasyon"> Konsültasyon</label>
                        <label style="display:flex; align-items:center; gap:4px; font-weight:600; font-size:0.85rem;"><input type="checkbox" value="Görüntüleme"> Görüntüleme</label>
                        <label style="display:flex; align-items:center; gap:4px; font-weight:600; font-size:0.85rem;"><input type="checkbox" value="Kan"> Kan/Tetkik</label>
                    </div>
                </div>
                <div class="form-group"><label>Notlar</label><textarea id="pNotes" rows="3"></textarea></div>
                <div style="display:flex; justify-content:flex-end; gap:12px">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">İptal</button>
                    <button type="submit" class="btn btn-primary">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const KEY = 'kh_data_stable_v1';
        let patients = [];
        try {
            const raw = localStorage.getItem(KEY);
            if(raw) patients = JSON.parse(raw);
        } catch (e) {
            console.error("Veri yukleme hatasi, sifirlaniyor...", e);
        }

        function save() { localStorage.setItem(KEY, JSON.stringify(patients)); render(); }

        function render(filter = '') {
            const grid = document.getElementById('patientGrid');
            grid.innerHTML = '';
            let list = patients;
            if(filter) list = patients.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()) || p.bed.toLowerCase().includes(filter.toLowerCase()));
            
            list.forEach(p => {
                let cardClass = 'patient-card glass';
                if(p.tags && p.tags.includes('Riskli')) cardClass += ' card-risk';
                if(p.tags && p.tags.includes('Taburcu')) cardClass += ' card-discharge';
                
                let tagsHtml = '';
                if(p.tags && p.tags.length > 0) {
                    tagsHtml = '<div class="tags-wrapper">' + p.tags.map(t => `<span class="tag-chip tag-${t}">${t}</span>`).join('') + '</div>';
                }

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div class="card-header"><span class="p-bed">${p.bed}</span> <div><button class="btn-icon" onclick="editP(${p.id})">✏️</button><button class="btn-icon" onclick="deleteP(${p.id})" style="color:red">🗑️</button></div></div>
                    <h3>${p.name}</h3><div class="p-diagnosis">${p.diag}</div>
                    ${tagsHtml}
                    <div class="p-notes">${p.notes || ''}</div>
                    <button class="btn-epikriz" onclick="copyE(${p.id})">📋 Epikrizi Kopyala</button>
                `;
                grid.appendChild(card);
            });
            document.getElementById('valTotal').innerText = patients.length;
            document.getElementById('valAction').innerText = patients.filter(p => p.tags && p.tags.length > 0 && !p.tags.includes("Taburcu")).length;
        }

        function setupTabs() {
            document.querySelectorAll('[data-tab]').forEach(link => {
                link.onclick = (e) => {
                    e.preventDefault();
                    const tab = link.getAttribute('data-tab');
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    document.getElementById('tab-' + tab).classList.add('active');
                    document.querySelectorAll('[data-tab]').forEach(l => l.classList.remove('active'));
                    document.querySelectorAll(`[data-tab="${tab}"]`).forEach(l => l.classList.add('active'));
                }
            });
        }

        window.editP = (id) => {
            const p = patients.find(p => p.id === id);
            document.getElementById('pId').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pBed').value = p.bed;
            document.getElementById('pDate').value = p.date;
            document.getElementById('pDiag').value = p.diag;
            document.getElementById('pNotes').value = p.notes;
            document.querySelectorAll('#tagsSelector input').forEach(chk => chk.checked = p.tags && p.tags.includes(chk.value));
            document.getElementById('patientModal').classList.add('active');
        }

        window.deleteP = (id) => { if(confirm('Silinsin mi?')) { patients = patients.filter(p => p.id !== id); save(); } }
        window.closeModal = () => document.getElementById('patientModal').classList.remove('active');
        
        document.getElementById('btnNewPatient').onclick = () => {
            document.getElementById('patientForm').reset();
            document.getElementById('pId').value = '';
            document.querySelectorAll('#tagsSelector input').forEach(chk => chk.checked = false);
            document.getElementById('patientModal').classList.add('active');
        }

        document.getElementById('patientForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('pId').value;
            const checkedTags = [];
            document.querySelectorAll('#tagsSelector input:checked').forEach(chk => checkedTags.push(chk.value));
            
            const data = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('pName').value,
                bed: document.getElementById('pBed').value,
                date: document.getElementById('pDate').value,
                diag: document.getElementById('pDiag').value,
                notes: document.getElementById('pNotes').value,
                tags: checkedTags
            };
            if(id) patients = patients.map(p => p.id == id ? data : p);
            else patients.push(data);
            save(); closeModal();
        }

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(patients)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `KH_Yedek_${new Date().toLocaleDateString()}.json`; a.click();
        }

        window.importData = () => {
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader(); reader.readAsText(e.target.files[0]);
                reader.onload = () => { if(confirm('Verileri yükle?')) { patients = JSON.parse(reader.result); save(); } }
            }; input.click();
        }

        window.copyE = (id) => {
            const p = patients.find(p => p.id === id);
            let tagsStr = p.tags && p.tags.length > 0 ? `\nPlan/Durum: ${p.tags.join(', ')}` : '';
            navigator.clipboard.writeText(`Hasta: ${p.name}\nYatak: ${p.bed}\nTanı: ${p.diag}${tagsStr}\nNot: ${p.notes}`).then(() => alert('Epikriz Kopyalandı!'));
        }

        // 19 Adet Klinik Skorlama Motoru (Dinamik Render)
        const medTools = [
          {
            id: "qsofa", title: "qSOFA Skoru", icon: "🩺",
            fields: [
              {type: "check", label: "Solunum ≥ 22/dk", score: 1},
              {type: "check", label: "Bilinç Değişikliği", score: 1},
              {type: "check", label: "Sistolik KB ≤ 100", score: 1}
            ],
            calc: (s) => `Skor: ${s} / 3 - ${s>=2?'Yüksek Risk (Sepsis)':'Düşük Risk'}`
          },
          {
            id: "gks", title: "Glasgow Koma Skalası (GKS)", icon: "🧠",
            fields: [

          {

          {

          {
            id: "timi", title: "TIMI Skoru (NSTEMI/UA)", icon: "🫀",
            fields: [

            ],

          },
          {
            id: "heart", title: "HEART Skoru", icon: "❤️",
            fields: [
              {type:"select", label:"Öykü (Anamnez)", opts:[[0,"Hafif Şüpheli"],[1,"Orta Derece Şüpheli"],[2,"Yüksek Şüpheli (Tipik Angina)"]]},
              {type:"select", label:"EKG", opts:[[0,"Normal"],[1,"Non-spesifik repolarizasyon bozukluğu"], [2,"Anlamlı ST çökmesi"]]},

            ],
            calc: (s) => `HEART: ${s}/10 - ${s>=7?'Yüksek Risk (MACE %50-65)': (s>=4?'Orta Risk (MACE %12-20)':'Düşük Risk (MACE %1-2)')}`

          {

              {type:"check", label:"Anormal Karaciğer Fonksiyonu", score:1},
              {type:"check", label:"İnme Öyküsü", score:1},
              {type:"check", label:"Kanama (Öykü veya anemi)", score:1},

              {type:"check", label:"İntoksikasyon bulgusu VAR", score:1},

            ],
            calc: (s) => s>0 ? `Sonuç: Görüntüleme GEREKLİ` : `NEXUS Negatif (Görüntüleme Gerekmez)`
          },
          {
            id:"canadian", title:"Canadian C-Spine Kuralı", icon:"🇨🇦",
            fields:[

            ],
            calc: (s) => s>0 ? `Sonuç: Görüntüleme GEREKLİ` : `Sonuç: Görüntüleme Gerekmez`
          },
          {

              {type:"check", label:"Yaş ≥ 65", score:1}
            ],
            calc: (s) => `CURB-65 Skoru: ${s} - ${s>=3?'Yüksek Risk (Ağır Pnömoni / YBÜ)':(s>=2?'Orta Risk (Hastaneye Yatış)':'Düşük Risk (Ayaktan)')}`
          },
          {

              {type:"check", label:"Nabız ≥ 110/dk", score:1},

              {type:"check", label:"Rebound hassasiyet", score:1},

              {type:"check", label:"Lökositoz (>10.000)", score:2},

              {type:"check", label:"AST > 250 U/L", score:1},

              {type:"select", label:"Sistolik KB", opts:[[0,"≥ 110"],[1,"100 - 109"],[2,"90 - 99"],[3,"< 90"]]},

              {type:"check", label:"Kalp Yetmezliği", score:2}
            ],
            calc: (s) => `GBS Skoru: ${s} - ${s>0 ? 'Endoskopi / Yatış İhtiyacı YÜKSEK' : 'Düşük Risk (Ayaktan Taburcu Düşünülebilir)'}`
          },

            id:"rockall", title:"Rockall Skoru (Klinik - Endoskopi Öncesi)", icon:"📉",

              {type:"select", label:"Ek Hastalık (Komorbidite)", opts:[[0,"Majör ek hastalık yok"],[2,"KY, İskemik kalp hst., majör komorbidite"],[3,"Böbrek/Karaciğer yetm., dissemine malignite"]]}
            ],
            calc: (s) => `Klinik Rockall: ${s} - ${s>=3?'Yüksek Risk (Mortalite/Tekrar Kanama)':'Düşük/Orta Risk'}`
          }
        ];

        function initTools() {
            const grid = document.getElementById('mainToolsGrid');
            grid.innerHTML = '';
            medTools.forEach(tool => {
                let html = `<div class="tool-card glass"><div class="tool-icon">${tool.icon}</div><h3>${tool.title}</h3>`;
                tool.fields.forEach((f, i) => {
                    const fid = `t_${tool.id}_${i}`;
                    if(f.type === 'check') {
                        html += `<label class="check-container" style="display:block; margin:10px 0"><input type="checkbox" id="${fid}" data-score="${f.score}" class="tc_${tool.id}"> <span style="font-size:0.9rem">${f.label}</span></label>`;
                    } else if (f.type === 'select') {
                        html += `<div class="form-group"><label>${f.label}</label><select id="${fid}" class="calc-select tc_${tool.id}">`;
                        f.opts.forEach(opt => {
                            html += `<option value="${opt[0]}">${opt[1]}</option>`;
                        });
                        html += `</select></div>`;
                    }
                });
                html += `<div class="result-box mt-3" id="res_${tool.id}" style="font-size:0.95rem;">Skor: 0</div></div>`;
                grid.innerHTML += html;
            });
            
            medTools.forEach(tool => {
                const updateCalc = () => {
                    let score = 0;
                    document.querySelectorAll(`.tc_${tool.id}`).forEach(input => {
                        if(input.type === 'checkbox') { if(input.checked) score += parseFloat(input.getAttribute('data-score')); }
                        else score += parseFloat(input.value);
                    });
                    document.getElementById(`res_${tool.id}`).innerText = tool.calc(score);
                };
                document.querySelectorAll(`.tc_${tool.id}`).forEach(el => el.addEventListener('change', updateCalc));
                updateCalc(); // ilk render için çalıştır
            });
        }

        document.getElementById('searchInput').oninput = (e) => render(e.target.value);
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'});

        setupTabs(); 
        render();
        initTools();

        // PWA Service Worker Kaydı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('✅ PWA ServiceWorker Aktif - Çevrimdışı Kullanıma Hazır:', reg.scope))
                .catch(err => console.log('⚠️ PWA ServiceWorker Hatası:', err));
            });
        }
    </script>
